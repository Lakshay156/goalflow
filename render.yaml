databases:
  - name: goalflow-db
    databaseName: goalflow
    user: goalflow
    plan: free

services:
  - type: web
    name: goalflow
    env: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: GoalFlow
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://goalflow.onrender.com  # update after deploy

      # Database (auto-linked from Render PostgreSQL)
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: goalflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: goalflow-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: goalflow-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: goalflow-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: goalflow-db
          property: password

      # Sessions & Cache (use database since no Redis on free tier)
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync

      # Logging
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      # Security
      - key: BCRYPT_ROUNDS
        value: 12
